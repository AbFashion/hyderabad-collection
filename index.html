<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AB Fashion — Hyderabad Collection System</title>
<style>
  :root{
    --pri:#5b5bd6; --pri2:#7c4dff; --grad:linear-gradient(135deg,#5b5bd6,#7c4dff);
    --bg:#eef1f7; --card:#fff; --ink:#1f2433; --muted:#7b8194;
    --line:#e3e7ef; --green:#16a34a; --greenbg:#e7f7ee; --amber:#f59e0b; --amberbg:#fef3df;
    --red:#e23b3b; --redbg:#fdeaea; --blue:#2563eb;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}

  /* ---------- LOGIN ---------- */
  #login{position:fixed;inset:0;background:var(--grad);display:flex;align-items:center;justify-content:center}
  .login-card{background:#fff;border-radius:16px;padding:34px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .login-card h1{font-size:20px;margin-bottom:4px}
  .login-card p{color:var(--muted);margin-bottom:20px;font-size:13px}
  .login-card label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 5px}
  .login-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px}
  .login-card button{width:100%;margin-top:18px;padding:12px;border:0;border-radius:9px;background:var(--grad);color:#fff;font-weight:700;font-size:15px}
  .login-err{color:var(--red);font-size:12px;margin-top:10px;min-height:14px}
  .login-hint{margin-top:16px;font-size:11px;color:var(--muted);line-height:1.6;border-top:1px solid var(--line);padding-top:12px}
  .logo-badge{width:46px;height:46px;border-radius:11px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;margin-bottom:14px}

  /* ---------- SHELL ---------- */
  #app{display:none;min-height:100vh}
  .topbar{background:var(--grad);color:#fff;padding:0 22px;height:60px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:30}
  .topbar .b{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-weight:800}
  .topbar h2{font-size:16px;font-weight:700}
  .topbar small{display:block;opacity:.8;font-weight:400;font-size:11px}
  .topbar .spacer{flex:1}
  .topbar .who{font-size:13px;text-align:right;line-height:1.3}
  .topbar .who b{display:block}
  .topbar .who span{opacity:.8;font-size:11px;text-transform:capitalize}
  .topbar button{background:rgba(255,255,255,.16);border:0;color:#fff;padding:8px 14px;border-radius:8px;font-weight:600}

  .layout{display:flex}
  .side{width:210px;background:#fff;min-height:calc(100vh - 60px);border-right:1px solid var(--line);padding:14px 0;position:sticky;top:60px;height:calc(100vh - 60px)}
  .side a{display:flex;align-items:center;gap:10px;padding:11px 20px;color:#525a6e;text-decoration:none;font-weight:600;font-size:13.5px;border-left:3px solid transparent}
  .side a .ic{width:18px;text-align:center}
  .side a:hover{background:#f5f6fb}
  .side a.active{color:var(--pri);background:#f1f0fd;border-left-color:var(--pri)}
  .side a.disabled{opacity:.35;pointer-events:none}
  .side .badge{margin-left:auto;background:var(--amber);color:#fff;font-size:11px;border-radius:10px;padding:1px 7px;font-weight:700}

  .main{flex:1;padding:24px 28px;max-width:1400px}
  .page-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
  .page-h h3{font-size:20px}
  .page-h .sub{color:var(--muted);font-size:13px;margin-top:2px}

  /* cards / kpi */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
  .kpi{border-radius:14px;padding:18px 18px 16px;color:#fff;box-shadow:0 8px 22px rgba(80,80,160,.13)}
  .kpi .l{font-size:11px;font-weight:700;letter-spacing:.5px;opacity:.92;text-transform:uppercase}
  .kpi .v{font-size:26px;font-weight:800;margin:8px 0 2px}
  .kpi .s{font-size:11.5px;opacity:.9}
  .kpi.k1{background:linear-gradient(135deg,#6a5cf0,#8b5cf6)}
  .kpi.k2{background:linear-gradient(135deg,#f59e0b,#f97316)}
  .kpi.k3{background:linear-gradient(135deg,#0ea5e9,#2563eb)}
  .kpi.k4{background:linear-gradient(135deg,#10b981,#16a34a)}

  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:20px}
  .panel h4{font-size:15px;margin-bottom:3px}
  .panel .ph-sub{color:var(--muted);font-size:12px;margin-bottom:14px}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:9px 10px;border-bottom:2px solid var(--line);white-space:nowrap}
  td{padding:10px;border-bottom:1px solid var(--line);font-size:13.5px}
  tr:last-child td{border-bottom:0}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .right{text-align:right}

  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
  .pill.cash{background:#e7f7ee;color:#15803d}
  .pill.cheque{background:#eef2ff;color:#4338ca}
  .pill.online{background:#fff1e7;color:#c2410c}
  .pill.pending{background:var(--amberbg);color:#b45309}
  .pill.posted{background:var(--greenbg);color:#15803d}
  .pill.bl{background:var(--redbg);color:#b91c1c}
  .pill.dep{background:#e7f7ee;color:#15803d}
  .pill.pay{background:var(--redbg);color:#b91c1c}

  .btn{border:0;border-radius:9px;padding:9px 16px;font-weight:700;font-size:13.5px}
  .btn.pri{background:var(--grad);color:#fff}
  .btn.gh{background:#fff;border:1px solid var(--line);color:#444}
  .btn.green{background:var(--green);color:#fff}
  .btn.red{background:var(--red);color:#fff}
  .btn.sm{padding:6px 12px;font-size:12.5px}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  .filterbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .filterbar select,.filterbar input{padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{background:#fff;border:0;padding:8px 14px;font-weight:600;color:#555;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button.on{background:var(--pri);color:#fff}

  .search{padding:9px 12px;border:1px solid var(--line);border-radius:9px;width:260px}

  /* customer collection list */
  .cust-row{border:1px solid var(--line);border-radius:11px;margin-bottom:9px;overflow:hidden;background:#fff}
  .cust-head{display:flex;align-items:center;gap:12px;padding:12px 15px;cursor:pointer}
  .cust-head:hover{background:#fafbff}
  .cust-code{width:48px;font-size:12px;color:var(--muted);font-weight:700}
  .cust-name{font-weight:700;flex:1}
  .cust-meta{display:block;font-weight:500;font-size:11.5px;color:var(--muted);margin-top:3px}
  .cust-bal{font-variant-numeric:tabular-nums;font-weight:700;color:var(--ink)}
  .cust-bal small{display:block;font-size:10px;color:var(--muted);font-weight:600;text-align:right}
  .chev{transition:transform .2s;color:var(--muted)}
  .cust-row.open .chev{transform:rotate(90deg)}
  .cust-form{display:none;padding:14px 15px;border-top:1px dashed var(--line);background:#fafbff}
  .cust-row.open .cust-form{display:block}
  .cust-paid{font-size:11px;color:var(--green);font-weight:700;margin-left:6px}
  .grid4{display:grid;grid-template-columns:1.1fr 1fr 1fr 1fr;gap:12px}
  .fld label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
  .fld input,.fld select{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:#fff}
  .words{margin-top:11px;font-size:12.5px;color:#555;font-style:italic;min-height:16px}
  .form-actions{margin-top:12px;display:flex;gap:8px}

  .empty{text-align:center;color:var(--muted);padding:34px;font-size:13.5px}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(20,22,40,.5);z-index:50;align-items:center;justify-content:center}
  .modal{background:#fff;border-radius:14px;padding:22px;width:440px;max-width:92vw}
  .modal h4{font-size:17px;margin-bottom:14px}
  .modal .fld{margin-bottom:12px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
  .check{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:13.5px}
  .check input{width:16px;height:16px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1f2433;color:#fff;padding:12px 20px;border-radius:10px;font-weight:600;font-size:13.5px;z-index:80;opacity:0;transition:opacity .25s;box-shadow:0 10px 30px rgba(0,0,0,.3)}
  .toast.show{opacity:1}
  .tag-week{background:#f1f0fd;color:var(--pri);font-weight:700;font-size:12px;padding:5px 12px;border-radius:8px}
  @media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.grid4{grid-template-columns:1fr 1fr}.side{width:64px}.side a span.lbl{display:none}}
</style>
</head>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="login-card">
    <div class="logo-badge">AB</div>
    <h1>Hyderabad Collection</h1>
    <p>AB Fashion Jewellery · Weekly Collection System</p>
    <label>Username</label>
    <input id="lg-user" autocomplete="off" placeholder="username">
    <label>Password</label>
    <input id="lg-pass" type="password" placeholder="password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Sign In</button>
    <div class="login-err" id="lg-err"></div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px" id="lg-status">Connecting…</div>
    <div class="login-hint" id="lg-hint"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="topbar">
    <div class="b">AB</div>
    <div><h2>AB Fashion — Hyderabad Collection<small>Weekly market collection · Locker · Payments</small></h2></div>
    <div class="spacer"></div>
    <div class="who"><b id="tb-name"></b><span id="tb-role"></span></div>
    <button onclick="refreshData()" title="Pull the latest data posted by others">↻ Refresh</button>
    <button onclick="logout()">Logout</button>
  </div>
  <div class="layout">
    <nav class="side" id="side"></nav>
    <div class="main" id="main"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>
<div class="toast" id="toast"></div>
<datalist id="banklist">

function migrate(){

}
let CRED = null;   // {user,pass} held in memory after sign-in (cloud mode) — used to authenticate every call
/* POST a small JSON body to the API (text/plain avoids a CORS preflight) */
function api(action, extra, cb, errcb){
  const body = Object.assign({ action:action, user:(CRED?CRED.user:''), pass:(CRED?CRED.pass:'') }, extra||{});
  fetch(API_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(body) })
    .then(function(r){ return r.json(); })
    .then(function(j){ cb(j); })
    .catch(function(e){ if(errcb) errcb(e); else toast('⚠ Network error — check connection'); });
}
function save(){
  const s = JSON.stringify(DB);
  localStorage.setItem(DB_KEY, s);   // local backup copy
  if(HAS_API && CRED){
    api('save', { data:s }, function(j){ if(j && !j.ok) toast('⚠ Save rejected: '+(j.error||'')); },
                            function(){ toast('⚠ Cloud sync failed — saved on this device, will retry'); });
  }
}
function boot(){

  if(HAS_API){

    const s = localStorage.getItem(DB_KEY) || '';
    try{ DB = (s && s.length>2)? JSON.parse(s) : buildDefault(); }catch(e){ DB = buildDefault(); }
    migrate();
    if(!s || s.length<3) save();
    if(el) el.textContent = 'Local mode (this device only — backend not linked yet)';
  }
}
function refreshData(){
  if(!HAS_API){ const s=localStorage.getItem(DB_KEY)||''; if(s){try{DB=JSON.parse(s);migrate();}catch(e){}} buildNav(); render(); toast('Refreshed'); return; }

  api('load', {}, function(j){

/* ---------- HELPERS ---------- */
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
function fmt(n){ const neg=n<0; n=Math.round(Math.abs(n)); let s=n.toLocaleString('en-PK'); return (neg?'-':'')+s; }
/* live comma formatting for amount inputs */
function fmtInput(el){ const v=el.value.replace(/[^0-9]/g,''); el.value = v? Number(v).toLocaleString('en-PK') : ''; }
function rawNum(id){ const el=document.getElementById(id); return el? parseFloat((el.value||'').replace(/,/g,''))||0 : 0; }
function today(){ return new Date(); }
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function prettyDate(s){ const d=new Date(s); return String(d.getDate()).padStart(2,'0')+'-'+MONTHS[d.getMonth()].slice(0,3)+'-'+d.getFullYear(); }

/* Wednesday collection-cycle week */
function weekOf(dateStr){
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  const off = (d.getDay() - 3 + 7) % 7;          // days since Wednesday
  const wed = new Date(d); wed.setDate(d.getDate()-off);
  const wom = Math.ceil(wed.getDate()/7);         // which Wednesday of month
  return {
    key: wed.getFullYear()+'-'+String(wed.getMonth()+1).padStart(2,'0')+'-W'+wom,
    year: wed.getFullYear(), month: wed.getMonth(), wom,
    start: wed,
    label: 'Week '+wom+' · '+MONTHS[wed.getMonth()]+' '+wed.getFullYear(),
    short: 'W'+wom+' '+MONTHS[wed.getMonth()].slice(0,3)
  };
}
const CUR = weekOf(ymd(today()));

/* number -> words (Pakistani: crore/lakh) */
function inWords(num){
  num = Math.round(Math.abs(num));
  if(num===0) return "Zero Rupees Only";
  const a=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const b=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  function two(n){ return n<20? a[n] : b[Math.floor(n/10)]+(n%10? " "+a[n%10]:""); }
  function three(n){ return (n>=100? a[Math.floor(n/100)]+" Hundred"+(n%100?" ":"") :"")+ (n%100? two(n%100):""); }
  let s="";
  const crore=Math.floor(num/10000000); num%=10000000;
  const lakh=Math.floor(num/100000); num%=100000;
  const thou=Math.floor(num/1000); num%=1000;
  const hund=num;
  if(crore) s+=three(crore)+" Crore ";
  if(lakh) s+=two(lakh)+" Lakh ";
  if(thou) s+=two(thou)+" Thousand ";
  if(hund) s+=three(hund);
  return s.trim().replace(/\s+/g,' ')+" Rupees Only";
}

/* effective balance = imported balance minus posted collections to date */
function custBalance(code){
  const c = DB.customers.find(x=>x.code===code); if(!c) return 0;
  const paid = DB.collections.filter(e=>e.custCode===code && e.status==='posted')
                  .reduce((s,e)=>s+e.amount,0);
  return c.bal - paid;
}
function lockerBalance(){ return DB.locker.reduce((s,e)=> s + (e.type==='deposit'? e.amount : -e.amount), 0); }
function totalCollected(){ return DB.collections.filter(e=>e.status==='posted').reduce((s,e)=>s+e.amount,0); }
function totalPayments(){ return DB.locker.filter(e=>e.type==='payment').reduce((s,e)=>s+e.amount,0); }
function pendingList(){ return DB.collections.filter(e=>e.status==='pending'); }

function scopedCollections(scope){
  return DB.collections.filter(e=>{
    if(e.status!=='posted') return false;
    const w=weekOf(e.date);
    if(scope==='week') return w.key===CUR.key;
    if(scope==='month') return w.year===CUR.year && w.month===CUR.month;
    return w.year===CUR.year;
  });
}
function customCollections(){
  return DB.collections.filter(e=> e.status==='posted'
    && (!dashFrom || e.date>=dashFrom) && (!dashTo || e.date<=dashTo));
}
function weekBarChart(){
  const map={};
  DB.collections.filter(e=>e.status==='posted').forEach(e=>{ const w=weekOf(e.date); if(w.year===CUR.year){ map[w.key]=(map[w.key]||0)+e.amount; }});
  const keys=Object.keys(map).sort();
  if(!keys.length) return `<div class="empty">No posted collections yet this year.</div>`;
  const max=Math.max(...keys.map(k=>map[k]));
  return `<div style="display:flex;align-items:flex-end;gap:14px;height:170px;padding:10px 4px">`+
    keys.map(k=>{ const h=Math.round(map[k]/max*140)+6; const lab=k.split('-W')[1]; const mo=MONTHS[parseInt(k.split('-')[1])-1].slice(0,3);
    return `<div style="flex:1;text-align:center;max-width:90px">
      <div style="font-size:11px;font-weight:700;color:#555;margin-bottom:5px">${fmt(map[k])}</div>
      <div style="height:${h}px;background:linear-gradient(180deg,#7c4dff,#5b5bd6);border-radius:7px 7px 0 0"></div>
      <div style="font-size:11px;color:#7b8194;margin-top:6px">W${lab} ${mo}</div></div>`; }).join('')+`</div>`;
}

  pend.forEach(e=>e.status='posted');
  // one weekly locker deposit (merge if week already deposited)
  const ex=DB.locker.find(l=>l.type==='deposit'&&l.weekKey===CUR.key);
  if(ex){ ex.amount+=sum; ex.detail='Hyderabad Collection · '+CUR.label+' ('+pend.length+' entries)'; }
  else DB.locker.push({ id:'l'+Date.now(), type:'deposit', amount:sum,
    date:ymd(today()), detail:'Hyderabad Collection · '+CUR.label+' ('+pend.length+' entries)',
    weekKey:CUR.key, by:ME.name });
  save(); toast('Posted '+fmt(sum)+' to locker ✓'); viewCollection(); buildNav();
}

/* =================== TOTAL COLLECTION =================== */
let fYear='', fMonth='', fWeek='';
function viewTotal(){
  const m=document.getElementById('main');
  const posted=DB.collections.filter(e=>e.status==='posted');
  const years=[...new Set(posted.map(e=>weekOf(e.date).year))].sort();
  if(fYear==='' && years.length) fYear=String(CUR.year);

  let rows=posted.filter(e=>{
    const w=weekOf(e.date);
    if(fYear && w.year!==+fYear) return false;
    if(fMonth!=='' && w.month!==+fMonth) return false;
    if(fWeek!=='' && w.wom!==+fWeek) return false;
    return true;
  }).sort((a,b)=> new Date(b.date)-new Date(a.date));
  const sum=rows.reduce((s,e)=>s+e.amount,0);

  let body=rows.map(e=>`<tr>
    <td>${prettyDate(e.date)}</td><td><span class="tag-week" style="font-size:11px">${weekOf(e.date).short}</span></td>
    <td>${e.custName}</td><td>${e.voucher}${e.slip?`<div style="font-size:11px;color:#888">Slip #${e.slip}</div>`:''}</td>
    <td><span class="pill ${e.mode.toLowerCase()}">${e.mode}</span>${e.mode==='Cheque'&&e.chequeNo?`<div style="font-size:11px;color:#888">${e.chequeBank||''} · Chq #${e.chequeNo} · dt ${prettyDate(e.chequeDate)}</div>`:''}</td>
    <td style="font-size:11.5px;color:#888">${inWords(e.amount).replace(' Rupees Only','')}</td>
    <td class="num">${fmt(e.amount)}</td><td style="font-size:11.5px;color:#888">${e.by}</td></tr>`).join('');
  if(!body) body=`<tr><td colspan="8" class="empty">No posted collections for this filter.</td></tr>`;

  const yOpts=years.map(y=>`<option value="${y}" ${+fYear===y?'selected':''}>${y}</option>`).join('')||`<option value="${CUR.year}">${CUR.year}</option>`;

  m.innerHTML=`
  <div class="page-h"><div><h3>Total Collection</h3><div class="sub">Every posted collection entry. This is the data your accountant posts into the main software.</div></div>
    <button class="btn gh" onclick="exportCSV()">⬇ Export CSV (Google Sheet feed)</button></div>
  <div class="filterbar">
    <select onchange="fYear=this.value;viewTotal()"><option value="">All Years</option>${yOpts}</select>
    <select onchange="fMonth=this.value;viewTotal()"><option value="">All Months</option>${MONTHS.map((mo,i)=>`<option value="${i}" ${fMonth==i?'selected':''}>${mo}</option>`).join('')}</select>
    <div class="seg">
      <button class="${fWeek===''?'on':''}" onclick="fWeek='';viewTotal()">All Weeks</button>
      ${[1,2,3,4,5].map(w=>`<button class="${fWeek==w?'on':''}" onclick="fWeek='${w}';viewTotal()">Week ${w}</button>`).join('')}
    </div>
  </div>
  <div class="panel" style="padding:0">
    <table><thead><tr><th>Date</th><th>Week</th><th>Customer</th><th>Voucher</th><th>Mode</th><th>In Words</th><th class="right">Amount</th><th>Entered By</th></tr></thead>
    <tbody>${body}</tbody>
    <tfoot><tr><td colspan="6" style="text-align:right;font-weight:800;border-top:2px solid var(--line)">TOTAL</td><td class="num" style="font-weight:800;border-top:2px solid var(--line)">${fmt(sum)}</td><td style="border-top:2px solid var(--line)"></td></tr></tfoot></table>
  </div>`;
}
function exportCSV(){
  const rows=DB.collections.filter(e=>e.status==='posted');
  let csv="Date,Week,Customer Code,Customer,Voucher,Mode,Bank,Cheque No,Cheque Date,Amount,In Words,Entered By\n";
  rows.forEach(e=>{ csv+=[prettyDate(e.date),weekOf(e.date).short,e.custCode,'"'+e.custName+'"',e.voucher,e.mode,'"'+(e.chequeBank||'')+'"',(e.chequeNo||''),(e.chequeDate?prettyDate(e.chequeDate):''),e.amount,'"'+inWords(e.amount)+'"','"'+e.by+'"'].join(',')+"\n"; });
  const blob=new Blob([csv],{type:'text/csv'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='hyderabad-collection.csv'; a.click();
  toast('CSV exported — this is what syncs to Google Sheets');
}

/* =================== LOCKER LEDGER =================== */
let lockFrom='', lockTo='';
function viewLocker(){
  const all=DB.locker.slice().sort((a,b)=> new Date(a.date)-new Date(b.date) || a.id.localeCompare(b.id));
  const fromOk = e => !lockFrom || e.date>=lockFrom;
  const toOk   = e => !lockTo   || e.date<=lockTo;

  // running balance is cumulative across the WHOLE ledger; opening = everything before the From date
  let run=0, opening=0, shownDep=0, shownPay=0, shownCount=0;
  let body=all.map(e=>{
    const before = lockFrom && e.date<lockFrom;
    run += e.type==='deposit'? e.amount : -e.amount;
    if(before){ opening=run; return ''; }
    if(!toOk(e)) return '';
    shownCount++; if(e.type==='deposit') shownDep+=e.amount; else shownPay+=e.amount;
    return `<tr>
      <td>${prettyDate(e.date)}</td><td>${e.detail}</td>
      <td><span class="pill ${e.type==='deposit'?'dep':'pay'}">${e.type==='deposit'?'DEPOSIT':'PAYMENT'}</span></td>
      <td class="num">${e.type==='deposit'?fmt(e.amount):''}</td>
      <td class="num">${e.type==='payment'?fmt(e.amount):''}</td>
      <td class="num"><b>${fmt(run)}</b></td></tr>`; }).join('');

  const filtered = lockFrom||lockTo;
  let openingRow = (filtered && lockFrom) ?
    `<tr style="background:#f7f8fc"><td colspan="5" style="color:#7b8194;font-style:italic">Opening balance (before ${prettyDate(lockFrom)})</td><td class="num"><b>${fmt(opening)}</b></td></tr>` : '';
  if(!body) body=`<tr><td colspan="6" class="empty">${filtered?'No locker entries in this date range.':'No locker entries yet. Post a weekly collection or add a payable voucher.'}</td></tr>`;

  const lb=lockerBalance();
  return `
  <div class="page-h"><div><h3>Locker Ledger</h3><div class="sub">Cash held in the Hyderabad locker. Weekly collections add in; payable vouchers take out.</div></div>
    ${can('voucher')?`<button class="btn pri" onclick="go('voucher')">＋ Payable Voucher</button>`:''}</div>
  <div class="kpis" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi k4"><div class="l">Current Locker Balance</div><div class="v">${fmt(lb)}</div><div class="s">Available in Hyderabad · whole ledger</div></div>
    <div class="kpi k1"><div class="l">Total Deposited</div><div class="v">${fmt(DB.locker.filter(e=>e.type==='deposit').reduce((s,e)=>s+e.amount,0))}</div><div class="s">From weekly collections</div></div>
    <div class="kpi k2"><div class="l">Total Paid Out</div><div class="v">${fmt(totalPayments())}</div><div class="s">Vendor &amp; bank payments</div></div>
  </div>
  <div class="filterbar">
    <span style="font-size:12px;font-weight:700;color:var(--muted)">DATE FILTER</span>
    <label style="font-size:12px;color:#555">From <input type="date" value="${lockFrom}" onchange="lockFrom=this.value;render()"></label>
    <label style="font-size:12px;color:#555">To <input type="date" value="${lockTo}" onchange="lockTo=this.value;render()"></label>
    ${filtered?`<button class="btn gh sm" onclick="lockFrom='';lockTo='';render()">Clear</button>
      <span style="font-size:12.5px;color:#555;margin-left:6px">Showing <b>${shownCount}</b> entries · in <b>${fmt(shownDep)}</b> · out <b>${fmt(shownPay)}</b></span>`:''}
  </div>
  <div class="panel" style="padding:0">
    <table><thead><tr><th>Date</th><th>Detail</th><th>Type</th><th class="right">Deposit (In)</th><th class="right">Payment (Out)</th><th class="right">Balance</th></tr></thead>
    <tbody>${openingRow}${body}</tbody></table>
  </div>`;
}

/* =================== PAYABLE VOUCHER =================== */
function viewVoucher(){
  const lb=lockerBalance();
  const recent=DB.locker.filter(e=>e.type==='payment').slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,8);
  let body=recent.map(e=>`<tr><td>${prettyDate(e.date)}</td><td>${e.ref||''}</td><td>${e.detail}</td><td class="num">${fmt(e.amount)}</td></tr>`).join('')
    || `<tr><td colspan="4" class="empty">No payments made yet.</td></tr>`;
  return `
  <div class="page-h"><div><h3>Payable Voucher</h3><div class="sub">Pay a vendor / send to bank from the Hyderabad locker. Deducts from locker balance.</div></div></div>
  <div class="panel" style="max-width:620px">
    <h4>New Payment</h4><div class="ph-sub">Locker balance available: <b>${fmt(lb)} PKR</b></div>
    <div class="grid4" style="grid-template-columns:1fr 1fr">
      <div class="fld"><label>Amount</label><input type="text" inputmode="numeric" id="pv-amt" placeholder="0" oninput="fmtInput(this);document.getElementById('pv-words').textContent=rawNum('pv-amt')?inWords(rawNum('pv-amt')):''"></div>
      <div class="fld"><label>Date</label><input type="date" id="pv-date" value="${ymd(today())}"></div>
      <div class="fld"><label>Mode</label><select id="pv-mode"><option>Cash to Vendor</option><option>Bank Transfer</option><option>Cheque</option><option>Sent to Karachi A/C</option></select></div>
      <div class="fld"><label>Paid To / Reference</label><input id="pv-ref" placeholder="Vendor name / slip no"></div>
    </div>
    <div class="fld" style="margin-top:12px"><label>Detail</label><input id="pv-detail" placeholder="e.g. Payment to Hassan Bhai for stock"></div>
    <div class="words" id="pv-words"></div>
    <div class="form-actions"><button class="btn red" onclick="addPayment()">Deduct from Locker</button></div>
  </div>
  <div class="panel"><h4>Payment Trail</h4><div class="ph-sub">Recent payments out of the locker</div>
    <table><thead><tr><th>Date</th><th>Paid To</th><th>Detail</th><th class="right">Amount</th></tr></thead><tbody>${body}</tbody></table>
  </div>`;
}
function addPayment(){
  if(!can('voucher')) return;
  const amt=rawNum('pv-amt');
  if(amt<=0){ toast('Enter an amount'); return; }
  if(amt>lockerBalance()){ if(!confirm('This exceeds the locker balance. Continue anyway?')) return; }
  DB.locker.push({ id:'l'+Date.now(), type:'payment', amount:amt,
    date:document.getElementById('pv-date').value,
    detail:(document.getElementById('pv-detail').value||document.getElementById('pv-mode').value),
    ref:document.getElementById('pv-ref').value, by:ME.name });
  save(); toast('Payment of '+fmt(amt)+' deducted from locker'); go('locker');
}

/* =================== ADMIN =================== */
function viewAdmin(){
  const rights=[['view','View Dashboard & Entries'],['enter','Enter Collection'],['post','Post to Locker'],['edit','Edit / Delete Entries'],['voucher','Payable Voucher'],['admin','Admin Access']];
  let rows=DB.users.map((u,i)=>`<tr>
    <td><b>${u.name}</b><div style="font-size:11.5px;color:#888">@${u.user} · ${u.pass? u.pass : '•••••• (set)'}</div></td>
    <td style="text-transform:capitalize">${u.role}</td>
    ${rights.map(r=>`<td style="text-align:center"><input type="checkbox" ${u.rights[r[0]]?'checked':''} onchange="setRight(${i},'${r[0]}',this.checked)"></td>`).join('')}
    <td>${u.user==='owner'?'':`<button class="btn red sm" onclick="delUser(${i})">Delete</button>`}</td></tr>`).join('');
  return `
  <div class="page-h"><div><h3>Admin — Users &amp; Rights</h3><div class="sub">Create users and control exactly what each one can do.</div></div>
    <button class="btn pri" onclick="newUserModal()">＋ Add User</button></div>
  <div class="panel" style="padding:0;overflow:auto">
    <table><thead><tr><th>User</th><th>Role</th>${rights.map(r=>`<th style="text-align:center">${r[1]}</th>`).join('')}<th></th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>
  <div class="panel">
    <h4>Weekly Balance Import</h4>
    <div class="ph-sub">Customer balances come from your main software each week. Current source: <b>${DB.balImport}</b></div>
    <button class="btn gh" onclick="reimport()">Re-import Balances (reset to Debtors Report)</button>
    <button class="btn gh" onclick="resetAll()" style="margin-left:8px;color:var(--red)">⟲ Reset All Demo Data</button>
  </div>
  `;
}
function setRight(i,key,val){ DB.users[i].rights[key]=val; save(); if(DB.users[i].user===ME.user){ ME.rights[key]=val; buildNav(); } toast('Rights updated'); }
function delUser(i){ if(confirm('Delete user '+DB.users[i].name+'?')){ DB.users.splice(i,1); save(); render(); } }
function newUserModal(){
  openModal(`<h4>Add User</h4>
    <div class="fld"><label>Full Name</label><input id="nu-name" placeholder="e.g. Imran (Hyderabad)"></div>
    <div class="fld"><label>Username</label><input id="nu-user" placeholder="username"></div>
    <div class="fld"><label>Password</label><input id="nu-pass" placeholder="password"></div>
    <div class="fld"><label>Role preset</label><select id="nu-role" onchange="presetRole()">
      <option value="employee">Employee (enter + post)</option>
      <option value="accountant">Accountant (view only)</option>
      <option value="owner">Owner (full access)</option>
      <option value="custom">Custom</option></select></div>
    <div class="modal-actions"><button class="btn gh" onclick="closeModal()">Cancel</button><button class="btn pri" onclick="createUser()">Create</button></div>`);
}
function presetRole(){}
function createUser(){
  const name=document.getElementById('nu-name').value.trim();
  const user=document.getElementById('nu-user').value.trim().toLowerCase();
  const pass=document.getElementById('nu-pass').value;
  const role=document.getElementById('nu-role').value;
  if(!name||!user||!pass){ toast('Fill all fields'); return; }
  if(DB.users.some(u=>u.user===user)){ toast('Username already exists'); return; }
  const presets={ owner:{view:1,enter:1,post:1,edit:1,voucher:1,admin:1}, accountant:{view:1,enter:0,post:0,edit:0,voucher:0,admin:0}, employee:{view:0,enter:1,post:1,edit:0,voucher:0,admin:0}, custom:{view:1,enter:0,post:0,edit:0,voucher:0,admin:0} };
  const r=presets[role]; const rights={}; Object.keys(r).forEach(k=>rights[k]=!!r[k]);
  DB.users.push({user,pass,name,role:role==='custom'?'custom':role,rights}); save(); closeModal(); render(); toast('User created');
}
function reimport(){ DB.customers=SEED_CUSTOMERS.map(c=>({...c,blacklist:!!c.blacklist})); DB.balImport='Re-imported · '+prettyDate(ymd(today())); save(); toast('Balances re-imported'); render(); }
function resetAll(){ if(confirm('Reset ALL demo data (collections, locker, users)? This cannot be undone.')){ localStorage.removeItem(DB_KEY); DB=load(); toast('Reset complete'); logout(); } }

/* ---------- MODAL / TOAST ---------- */
function openModal(html){ document.getElementById('modalBox').innerHTML=html; document.getElementById('modalBg').style.display='flex'; }
function closeModal(){ document.getElementById('modalBg').style.display='none'; }
document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg') closeModal(); });
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }

/* ---------- LOGIN HINT ---------- */
document.getElementById('lg-hint').innerHTML=
  'Demo logins:<br>• <b>owner</b> / owner — full access<br>• <b>accountant</b> / accountant — view only<br>• <b>employee</b> / employee — enter + post';

</script>
